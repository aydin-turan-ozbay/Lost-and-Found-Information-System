<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Lost and Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <form action="../backend/register.php" method="POST">
            
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input 
                    type="text" 
                    id="full_name" 
                    name="full_name" 
                    placeholder="John Doe" 
                    required
                    oninvalid="this.setCustomValidity('Please enter your full name.')"
                    oninput="this.setCustomValidity('')"
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="example@mail.com" 
                    required
                    oninvalid="this.setCustomValidity('Please enter a valid email address without special characters like ı, ş, ğ.')"
                    oninput="this.setCustomValidity('')"
                >
            </div>
            
            <div class="form-group">
                <label for="student_id">Student / Staff ID</label>
                <input 
                    type="text" 
                    id="student_id" 
                    name="student_id" 
                    placeholder="e.g. 2021001" 
                    required
                    oninvalid="this.setCustomValidity('Please enter your Student or Staff ID.')"
                    oninput="this.setCustomValidity('')"
                >
            </div>
            
            <div class="form-group">
                <label for="role">Your Role</label>
                <select id="role" name="role">
                    <option value="student">Student</option>
                    <option value="staff">Staff</option>
                    <option value="academician">Academician</option>
                    <option value="visitor">Visitor</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="password">Password (Min. 8 characters)</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="******" 
                    minlength="8" 
                    required
                    oninvalid="this.setCustomValidity('Password must be at least 8 characters long.')"
                    oninput="this.setCustomValidity('')"
                >
            </div>
            
            <button type="submit">Create Account</button>
        </form>
        <p class="footer-text">Already have an account? <a href="login.html">Login</a></p>
    </div>
</body>
</html>
